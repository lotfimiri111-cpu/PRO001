<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:450px;overflow:hidden;background:transparent}
body{
  width:800px;height:450px;
  background:linear-gradient(150deg,#06142A 0%,#0D2347 60%,#07172F 100%);
  font-family:'Cairo',sans-serif;direction:rtl;position:relative;
}
.bg-mesh{position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(198,160,60,.09),transparent 55%),radial-gradient(ellipse at 20% 80%,rgba(198,160,60,.06),transparent 55%);pointer-events:none}

/* HEADER */
.hdr{position:absolute;top:0;right:0;left:0;height:118px;background:linear-gradient(150deg,#102040,#07172F)}
.hdr::after{content:'';position:absolute;bottom:0;right:0;left:0;height:3px;background:linear-gradient(90deg,transparent,#C6A03C 30%,#E8C96A 65%,transparent)}
/* RTL: شريط جانبي على اليمين */
.hdr-side{position:absolute;top:0;right:0;width:6px;height:100%;background:linear-gradient(180deg,#E8C96A,#C6A03C,#8B6E28)}

/* رقم الشريحة — اليسار */
.snum{position:absolute;top:22px;left:22px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#C6A03C,#E8C96A);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#07172F;box-shadow:0 4px 16px rgba(198,160,60,.5)}
.ttl{position:absolute;top:20px;left:82px;right:20px;font-size:20px;font-weight:900;color:#F0E8D8;text-align:right}
.sub{position:absolute;top:63px;left:82px;right:20px;font-size:11px;color:rgba(198,160,60,.85);text-align:right;font-weight:600}

/* CARDS GRID */
.cards{position:absolute;top:128px;right:12px;left:12px;bottom:8px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:7px}
.kc{background:linear-gradient(135deg,#0F1E38,#0A1628);border-radius:9px;border-top:2px solid rgba(198,160,60,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(198,160,60,.07),transparent 65%)}
.knum{font-size:27px;font-weight:900;color:#E8C96A;line-height:1;text-shadow:0 2px 8px rgba(198,160,60,.3)}
.kdiv{width:65%;height:1px;background:rgba(138,155,181,.3)}
.ksub{font-size:9.5px;color:#8A9BB5;text-align:center;direction:rtl;line-height:1.3}
.ksub2{font-size:9px;color:rgba(198,160,60,.8);text-align:center;font-weight:700}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="hdr"><div class="hdr-side"></div></div>
<div class="snum">7</div>
<div class="ttl">الأرقام والإحصاءات الرئيسية</div>
<div class="sub">مؤشرات الدراسة التطبيقية · بن علي محمد · ماستر مالية ومحاسبة</div>
<div class="cards">
  <div class="kc"><div class="knum">78.4%</div><div class="kdiv"></div><div class="ksub">معدل العائد على الأصول ROA</div></div>
  <div class="kc"><div class="knum">0.814</div><div class="kdiv"></div><div class="ksub">قوة النموذج التفسيرية R²</div></div>
  <div class="kc"><div class="knum">432</div><div class="ksub2">مشاهدة</div><div class="kdiv"></div><div class="ksub">عدد المشاهدات (48×9)</div></div>
  <div class="kc"><div class="knum">+15.7%</div><div class="kdiv"></div><div class="ksub">نمو ROE خلال 2020–2023</div></div>
  <div class="kc"><div class="knum">48</div><div class="ksub2">مؤسسة</div><div class="kdiv"></div><div class="ksub">حجم العينة (بانل متوازن)</div></div>
  <div class="kc"><div class="knum">48.3</div><div class="ksub2">F-test ***</div><div class="kdiv"></div><div class="ksub">اختبار فيشر الكلي</div></div>
</div>
</body></html>
