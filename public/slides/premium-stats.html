<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:450px;overflow:hidden;background:transparent}
body{width:800px;height:450px;font-family:'Cairo',sans-serif;direction:rtl;display:flex;background:#040D1E}

/* SIDEBAR — اليمين في RTL */
.sb{width:195px;height:450px;flex-shrink:0;background:linear-gradient(180deg,#082840,#040D1E);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-left:4px solid rgba(0,212,255,.35);position:relative;overflow:hidden}
.sb::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:linear-gradient(180deg,#00D4FF,rgba(0,212,255,.2),transparent)}
.sb-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.15),transparent 70%);pointer-events:none}
.sb-ico{width:76px;height:76px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00D4FF,#0088B3);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 30px rgba(0,212,255,.55),0 0 60px rgba(0,212,255,.2)}
.sb-t1{font-size:22px;font-weight:900;color:#E8F8FF;text-shadow:0 2px 8px rgba(0,212,255,.3)}
.sb-t2{font-size:13px;color:#5A8B9B;font-weight:600}
.sb-div{width:100px;height:2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.6),transparent);border-radius:2px}
.sb-th{font-size:11px;color:#00D4FF;text-align:center;font-weight:700;letter-spacing:.3px}
.sb-pg{position:absolute;bottom:14px;font-size:11px;color:#4A7080;font-weight:600}

/* CONTENT */
.cnt{flex:1;height:450px;background:linear-gradient(135deg,#040D1E,#060F22);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:7px;padding:10px;border-top:3px solid rgba(0,212,255,.4)}
.kc{background:linear-gradient(135deg,#050E1F,#040D1E);border-radius:8px;border-top:2px solid rgba(0,212,255,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(0,212,255,.06),transparent 60%)}
.knum{font-size:26px;font-weight:900;color:#00D4FF;line-height:1;text-shadow:0 2px 8px rgba(0,212,255,.4)}
.ksub{font-size:9px;color:#5A8B9B;text-align:center;line-height:1.3}
.kdiv{width:60%;height:1px;background:rgba(90,139,155,.35)}
.klbl{font-size:10px;color:#C8E8F0;text-align:center;direction:rtl;font-weight:600}
</style>
</head>
<body>
<div class="sb">
  <div class="sb-glow"></div>
  <div class="sb-ico">📈</div>
  <div class="sb-t1">الأرقام</div>
  <div class="sb-t2">الرئيسية</div>
  <div class="sb-div"></div>
  <div class="sb-th">Atlas Corporate</div>
  <div class="sb-pg">7 / 13</div>
</div>
<div class="cnt">
  <div class="kc"><div class="knum">78.4%</div><div class="kdiv"></div><div class="klbl">معدل العائد ROA</div></div>
  <div class="kc"><div class="knum">0.814</div><div class="kdiv"></div><div class="klbl">قوة النموذج R²</div></div>
  <div class="kc"><div class="knum">432</div><div class="ksub">مشاهدة</div><div class="kdiv"></div><div class="klbl">حجم العينة</div></div>
  <div class="kc"><div class="knum" style="font-size:20px">+15.7%</div><div class="kdiv"></div><div class="klbl">نمو ROE 2020–2023</div></div>
  <div class="kc"><div class="knum">48</div><div class="ksub">مؤسسة</div><div class="kdiv"></div><div class="klbl">عينة البانل</div></div>
  <div class="kc"><div class="knum">48.3</div><div class="ksub">F-test ***</div><div class="kdiv"></div><div class="klbl">اختبار فيشر الكلي</div></div>
</div>
</body></html>
