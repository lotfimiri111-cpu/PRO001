services:
  - type: web
    name: mathkarati-pro
    env: python
    buildCommand: chmod +x build.sh && bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180 --keep-alive 5
    envVars:
      - key: PORT
        value: 10000
      - key: ADMIN_PASSWORD_HASH
        generateValue: false
        value: "CHANGE_ME_sha256_of_your_password"
      - key: SECRET_KEY
        generateValue: true
      - key: STORAGE_DIR
        value: /opt/render/project/src/storage
      - key: DB_PATH
        value: /opt/render/project/src/mathkarati_payments.db
